language: "ko-KR"

reviews:
  profile: "chill"
  level: basic

  auto_review:
    enabled: true
    triggers:
      - pull_request

  review_branches:
    include:
      - "**"

  high_level_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  suggested_reviewers: true
  auto_assign_reviewers: true
  review_status: true