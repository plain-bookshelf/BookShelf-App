language: "ko-KR"

reviews:
  profile: "chill"
  level: basic

  auto_review:
    enabled: true
    on_default_branch_only: false
    triggers:
      - pull_request

  high_level_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  suggested_reviewers: true
  auto_assign_reviewers: true
  review_status: true

tests:
  suggest: false
  generate: false